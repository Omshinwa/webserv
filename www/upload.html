<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wsgit — Gestion des fichiers</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    max-width: 680px;
    margin: 40px auto;
    padding: 0 20px;
  }
  h1 {
    background: linear-gradient(90deg, #2dd4bf, #3b82f6);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    font-size: 1.6rem;
    margin-bottom: 24px;
  }
  h2 { font-size: 1rem; color: #94a3b8; margin-bottom: 12px; }
  .card {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 18px;
  }
  input[type=file] { color: #cbd5e1; margin: 10px 0; width: 100%; }
  .btn {
    background: #3b82f6;
    color: #fff;
    border: 0;
    border-radius: 8px;
    padding: 9px 16px;
    cursor: pointer;
    font-size: 14px;
  }
  .btn:hover { background: #2563eb; }
  .btn-del {
    background: transparent;
    color: #f87171;
    border: 1px solid #f87171;
    border-radius: 6px;
    padding: 4px 10px;
    cursor: pointer;
    font-size: 13px;
  }
  .btn-del:hover { background: #7f1d1d; border-color: #ef4444; }
  .btn-sm {
    font-size: 13px;
    padding: 6px 12px;
    background: #334155;
  }
  .btn-sm:hover { background: #475569; }

  /* toast */
  #toast {
    font-size: 13px;
    font-family: ui-monospace, monospace;
    padding: 10px 14px;
    border-radius: 8px;
    min-height: 36px;
    margin-top: 10px;
    background: #0b1220;
    display: none;
  }
  #toast.ok  { display: block; color: #4ade80; }
  #toast.err { display: block; color: #f87171; }

  /* file list */
  #file-list { list-style: none; }
  #file-list li {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    border-bottom: 1px solid #1e293b;
    gap: 10px;
  }
  #file-list li:last-child { border-bottom: none; }
  .filename {
    font-family: ui-monospace, monospace;
    font-size: 14px;
    color: #7dd3fc;
    flex: 1;
    word-break: break-all;
  }
  .filename a { color: inherit; text-decoration: none; }
  .filename a:hover { text-decoration: underline; }
  #empty-msg { color: #475569; font-style: italic; font-size: 14px; padding: 8px 0; }
  .list-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<nav style="margin-bottom:20px">
  <a href="/" style="color:#94a3b8;text-decoration:none;font-size:14px">← Accueil</a>
</nav>
<h1>42 Webserv — Fichiers</h1>

<!-- Upload -->
<div class="card">
  <h2>Uploader un fichier</h2>
  <input type="file" id="file-input">
  <button class="btn" id="btn-upload">Envoyer</button>
  <div id="toast"></div>
</div>

<!-- File list -->
<div class="card">
  <div class="list-header">
    <h2>Fichiers uploadés</h2>
    <button class="btn btn-sm" id="btn-refresh">↻ Actualiser</button>
  </div>
  <ul id="file-list"></ul>
  <p id="empty-msg" style="display:none">Aucun fichier.</p>
</div>

<script>
(function () {
  var UPLOAD_PATH = '/uploads';

  function toast(msg, cls) {
    var el = document.getElementById('toast');
    el.textContent = msg;
    el.className = cls;
  }

  // ── list files ──────────────────────────────────────────────────────────
  function renderList(files) {
    var ul = document.getElementById('file-list');
    var empty = document.getElementById('empty-msg');
    ul.innerHTML = '';
    if (files.length === 0) {
      empty.style.display = '';
      return;
    }
    empty.style.display = 'none';
    files.forEach(function (name) {
      var li = document.createElement('li');
      var span = document.createElement('span');
      span.className = 'filename';
      var a = document.createElement('a');
      a.href = UPLOAD_PATH + '/' + encodeURIComponent(name);
      a.target = '_blank';
      a.textContent = name;
      span.appendChild(a);

      var btn = document.createElement('button');
      btn.className = 'btn-del';
      btn.textContent = 'Supprimer';
      btn.onclick = function () { deleteFile(name); };

      li.appendChild(span);
      li.appendChild(btn);
      ul.appendChild(li);
    });
  }

  function fetchFileList() {
    fetch(UPLOAD_PATH + '/')
      .then(function (r) { return r.text(); })
      .then(function (html) {
        var parser = new DOMParser();
        var doc = parser.parseFromString(html, 'text/html');
        var links = doc.querySelectorAll('a');
        var files = [];
        for (var i = 0; i < links.length; i++) {
          var name = links[i].textContent.trim();
          // skip parent directory link
          if (name === '..' || name === '') continue;
          // strip trailing slash (directories) – only keep files
          if (name[name.length - 1] !== '/') files.push(name);
        }
        renderList(files);
      })
      .catch(function () { renderList([]); });
  }

  // ── delete ───────────────────────────────────────────────────────────────
  function deleteFile(name) {
    fetch(UPLOAD_PATH + '/' + encodeURIComponent(name), { method: 'DELETE' })
      .then(function (r) {
        if (r.status === 204) {
          toast('Fichier "' + name + '" supprimé.', 'ok');
        } else {
          toast('Erreur ' + r.status + ' lors de la suppression.', 'err');
        }
        fetchFileList();
      })
      .catch(function (e) {
        toast('Erreur réseau : ' + e.message, 'err');
      });
  }

  // ── upload ───────────────────────────────────────────────────────────────
  document.getElementById('btn-upload').addEventListener('click', function () {
    var input = document.getElementById('file-input');
    var f = input.files[0];
    if (!f) { toast('Aucun fichier sélectionné.', 'err'); return; }

    toast('Upload de "' + f.name + '" (' + f.size + ' octets)…', 'ok');

    fetch(UPLOAD_PATH + '/' + encodeURIComponent(f.name), {
      method: 'POST',
      headers: { 'Content-Type': f.type || 'application/octet-stream' },
      body: f
    })
    .then(function (r) {
      if (r.status === 201 || r.status === 204) {
        toast('"' + f.name + '" uploadé avec succès (HTTP ' + r.status + ').', 'ok');
        input.value = '';
        fetchFileList();
      } else {
        toast('Erreur serveur : HTTP ' + r.status, 'err');
      }
    })
    .catch(function (e) {
      toast('Erreur réseau : ' + e.message, 'err');
    });
  });

  document.getElementById('btn-refresh').addEventListener('click', fetchFileList);

  // load on startup
  fetchFileList();
})();
</script>
</body>
</html>
