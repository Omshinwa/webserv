<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wsgit — Upload</title>
<style>
  body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;max-width:640px;margin:40px auto;padding:0 20px}
  h1{background:linear-gradient(90deg,#2dd4bf,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent}
  .card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:20px;margin:18px 0}
  input,button{font-size:15px}
  input[type=file]{margin:10px 0;color:#cbd5e1}
  button{background:#3b82f6;color:#fff;border:0;border-radius:8px;padding:10px 18px;cursor:pointer}
  button:hover{background:#2563eb}
  #log{white-space:pre-wrap;font-family:ui-monospace,monospace;font-size:13px;background:#0b1220;border-radius:8px;padding:14px;min-height:60px}
  .ok{color:#4ade80}.err{color:#fe7676}.muted{color:#94a3b8}
  code{background:#0b1220;padding:2px 6px;border-radius:4px}
</style>
</head>
<body>
<h1>42 Webserv — Upload</h1>

<div class="card">
  <p class="muted">Envoie le <strong>contenu brut</strong> du fichier en POST vers
  <code>/upload/&lt;nom&gt;</code>. Compatible avec <code>handle_post</code> (pas de multipart).</p>
  <input type="file" id="file">
  <br>
  <button id="send">Uploader</button>
</div>

<div class="card">
  <strong>Log</strong>
  <div id="log" class="muted">En attente…</div>
</div>

<script>
const $ = id => document.getElementById(id);
const log = (msg, cls='') => { $('log').className = cls; $('log').textContent = msg; };

$('send').addEventListener('click', async () => {
  const f = $('file').files[0];
  if (!f) { log('Aucun fichier selectionne.', 'err'); return; }
  log('Upload de "' + f.name + '" (' + f.size + ' octets)…');
  try {
    // body brut = contenu du fichier ; nom dans l'URI (pas multipart)
    const res = await fetch('/upload/' + encodeURIComponent(f.name), {
      method: 'POST',
      headers: { 'Content-Type': f.type || 'application/octet-stream' },
      body: f
    });
    const loc = res.headers.get('Location') || '';
    const verdict = res.status === 201 ? 'cree' : res.status === 204 ? 'ecrase (existait)' : 'reponse';
    log('HTTP ' + res.status + ' — ' + verdict +
        (loc ? '\nLocation: ' + loc : '') +
        '\nGET du fichier: /upload/' + f.name,
        (res.status === 201 || res.status === 204) ? 'ok' : 'err');
  } catch (e) {
    log('Erreur reseau: ' + e.message, 'err');
  }
});
</script>
</body>
</html>
