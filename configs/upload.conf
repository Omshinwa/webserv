server {
    listen 0.0.0.0:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 10M;
    
    location /uploads {
        methods GET POST DELETE;
        upload_dir www/uploads;
        autoindex on;
    }

    location / {
        methods GET POST DELETE;
    }
}
