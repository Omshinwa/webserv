# Config de test upload pour wsgit
# lancer: ./webserv configs/upload.conf  (apres avoir copie ce fichier dans configs/)
server {
    listen 0.0.0.0:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 10000000;     # 10 MB

    # Upload dans un dossier dedie : filename pris depuis l'URI
    location /upload {
        methods GET POST DELETE;
        upload_dir www/uploads;
    }

    # Upload "brut" a root+URI (sans upload_dir) pour comparer le comportement
    location / {
        methods GET POST DELETE;
    }
}
