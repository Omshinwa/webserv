# Config built for the subject's tester requirements:
#   /            -> GET only
#   *.bla        -> POST, runs the cgi_test executable (cgi_tester.bin)
#   /post_body   -> POST, body capped at 100 bytes
#   /directory/  -> GET, served from the YoupiBanane repo, index youpi.bad_extension
#
# NOTE 1: this webserv only supports `client_max_body_size` at the *server*
#         level, so the 100-byte cap below applies to every route, not just
#         /post_body (this is the config-only tradeoff that was chosen).
#
# NOTE 2: locations resolve files as <root><full-URI> (nginx `root` style --
#         the location prefix is NOT stripped). The `directory -> YoupiBanane`
#         symlink at the repo root lets URLs under /directory/ resolve into the
#         YoupiBanane tree while keeping `root .`.

server {
    listen 127.0.0.1:8080;
    server_name localhost;
    client_max_body_size 1000000000;

    root www/website;
    index index.html;

    # "/" answers GET only; POST/DELETE -> 405.
    location / {
        methods GET;
    }

    # Accepts any POST and stores the body (subject to the 100-byte cap above).
    location /post_body {
        methods POST;
        upload_dir www/website/uploads;
        client_max_body_size 100;
    }

    # GET served from the YoupiBanane repository.
    # No file requested -> index youpi.bad_extension.
    # *.bla files here are POSTed to the cgi_test executable.
    location /directory {
        methods GET POST;
        root YoupiBanane;
        index youpi.bad_extension;
        cgi .bla /www/website/cgi-bin/cgi_tester.bin;
    }
}

