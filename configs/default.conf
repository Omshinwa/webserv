# Minimal alternate config — useful for testing client_max_body_size and
# a server with no default index.
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 100;          # 100 bytes only — easy 413 test
    autoindex off;

    location / {
        methods GET POST;
        cgi .py;
        cgi .sh;
        cgi .bin;
    }

    location /hidden.html {
        methods GET;
        return 301 /public.html;
    }

    location /public.html {
        methods GET POST;
    }
}

server {
    listen 127.0.0.2:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 100;          # 100 bytes only — easy 413 test

    location / {
        methods GET POST;
    }
}