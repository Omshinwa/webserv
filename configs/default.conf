# Minimal alternate config — useful for testing client_max_body_size and
# a server with no default index.
server {
    listen 0.0.0.0:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 100;          # 100 bytes only — easy 413 test
    autoindex true;

    location / {
        methods GET POST;
    }

    location /shadow.html {
        methods GET;
        return 301 /pigeon.html;
    }

    location /pigeon.html {
        methods GET POST;
    }
}

server {
    listen 0.0.0.1:8080;
    server_name localhost;

    root www;
    index index.html;
    client_max_body_size 100;          # 100 bytes only — easy 413 test

    location / {
        methods GET POST;
    }
}