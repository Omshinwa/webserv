# Minimal alternate config — useful for testing client_max_body_size and
# a server with no default index.
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    root www/website;
    index index.html;
    client_max_body_size 10000000;     # 100 bytes only — easy 413 test
    autoindex off;
    error_page 404 /errors/404.html;

    # this automatically redirects 404 to a new page
    location /errors/404.html
    {
        methods GET;
        return 301 /errors/new_404.html;
    }

    location / {
        methods GET;
    }

    location /cgi-bin/ {
        methods GET POST;
        autoindex on;
        cgi .py;
        cgi .sh;
        cgi .bin;
        cgi .php;
    }

    location /errors {
        methods GET;
        index new_index.html;
    }
    
    location /google {
        methods GET;
        return 302 https://www.google.com/;
    }

    location /hidden.html {
        methods GET;
        return 301 /public.html;
    }

    location /public.html {
        methods GET POST;
    }
    
    location /uploads {
        methods GET POST DELETE;
        upload_dir www/website/uploads; autoindex on;
    }
}

server {
    listen 127.0.0.1:8081;
    server_name localhost2;

    root www/website2;

    location / {
        methods GET POST;
    }
}
