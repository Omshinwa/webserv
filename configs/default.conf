# Minimal alternate config — useful for testing client_max_body_size and
# a server with no default index.
server {
    listen 127.0.0.1:8080;
    server_name localhost;

    root www/website;
    index index.html;
    client_max_body_size 10000000;          # 100 bytes only — easy 413 test
    autoindex off;

    location / {
        methods GET POST;
        cgi .py;
        cgi .sh;
        cgi .bin;
        cgi .php;
    }

    location /hidden.html {
        methods GET;
        return 301 /public.html;
    }

    location /public.html {
        methods GET POST;
    }
    
    location /uploads {
        methods GET POST DELETE;
        upload_dir www/website/uploads;
        autoindex on;
    }
}

server {
    listen 127.0.0.1:8080;
    server_name localhost2;

    root www/website2;

    location / {
        methods GET POST;
    }
}
